# Server
server.port=8080

# H2 Database (Development)
spring.datasource.url=jdbc:h2:file:./chatbot-db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=YourSuperSecretJWTKeyThatIsAtLeast256BitsLongForSecurity2024!
jwt.expiration=86400000

# Gemini API
gemini.api.key=AIzaSyDKfSahSdSUF3rPvKx2XmcQ2xLXGP9mzX0
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models

# CORS
cors.allowed.origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.app.chatbot=DEBUG
logging.level.org.springframework.security=WARN

